<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hover</title>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:url("https://images.unsplash.com/photo-1614851099511-773084f6911d?fm=jpg&q=60&w=3000&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Z3JhZGllbnQlMjBiYWNrZ3JvdW5kfGVufDB8fDB8fHww");
      font-family: Arial,'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }

    .my-div {
      width: 300px;
      height: 300px;
      background-color:#f54804 ;
      color: rgb(12, 0, 0);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: background-color 200ms ease;
    }

    .my-div:hover {
      animation: Move 5s linear infinite;
      background-color:#f6b80c ;
    }

    @keyframes Move {
      0%   { transform: translate(0,0); }
      25%  { transform: translate(120px,0); }
      50%  { transform: translate(120px,120px); }
      75%  { transform: translate(0,120px); }
      100% { transform: translate(0,0); }
    }
  </style>
</head>

<body>
  <div class="my-div"><b><i>TOUCH→</i></b></div>
</body>
</html>
